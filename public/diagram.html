<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueprint Builder Concept</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #0f172a;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            width: 800px;
        }
        .header {
            margin-bottom: 30px;
        }
        .pipeline {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
        }
        .stage {
            border: 2px solid #e2e8f0;
            padding: 16px 24px;
            border-radius: 8px;
            font-weight: 600;
            background: #fff;
            position: relative;
        }
        .arrow {
            flex: 1;
            height: 2px;
            background: #cbd5e1;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .arrow::after {
            content: '';
            position: absolute;
            right: 0;
            top: -4px;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 8px solid #cbd5e1;
        }
        .arrow-badge {
            background: #eff6ff;
            color: #3b82f6;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid #bfdbfe;
        }
        .arrow:hover {
            background: #3b82f6;
        }
        .arrow:hover::after {
            border-left-color: #3b82f6;
        }
        .panel {
            border-top: 1px solid #e2e8f0;
            padding-top: 30px;
            display: flex;
            gap: 40px;
        }
        .panel-content {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 24px;
            border-radius: 8px;
            flex: 1;
        }
        .btn {
            background: #3b82f6;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="margin:0">Admin Pipeline Editor</h2>
            <p style="color:#64748b; margin-top:8px">Click an arrow between stages to configure its transition rules.</p>
        </div>

        <div class="pipeline">
            <div class="stage">New Lead</div>
            <div class="arrow">
                <div class="arrow-badge">Contacted</div>
            </div>
            <div class="stage" style="border-color: #3b82f6; box-shadow: 0 0 0 3px #bfdbfe;">Contacted</div>
            <div class="arrow" style="background: #3b82f6;">
                <div class="arrow-badge" style="background: #3b82f6; color: white;">Qualify Lead</div>
            </div>
            <div class="stage">Qualified</div>
        </div>

        <div class="panel">
            <div style="flex: 1;">
                <h3 style="margin-top:0">Configuring Transition</h3>
                <p style="color:#64748b">From: <strong>Contacted</strong> ➔ To: <strong>Qualified</strong></p>
                
                <div class="panel-content">
                    <label style="display:block; font-weight:600; margin-bottom:8px">Button Name</label>
                    <input type="text" value="Qualify Lead" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:4px; margin-bottom:20px; box-sizing:border-box;">
                    
                    <label style="display:block; font-weight:600; margin-bottom:12px">Required Fields to Execute</label>
                    
                    <div style="margin-bottom:8px">
                        <input type="checkbox" checked id="ind"> <label for="ind">Industry</label>
                    </div>
                    <div style="margin-bottom:8px">
                        <input type="checkbox" checked id="bud"> <label for="bud">Budget</label>
                    </div>
                    <div style="margin-bottom:8px">
                        <input type="checkbox" id="emp"> <label for="emp">Employee Count</label>
                    </div>

                    <button class="btn">Save Transition Rule</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
